name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install tmux
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Build web
        run: bun run web:build

      - name: Check Electron scripts
        run: |
          node --check electron/main.cjs
          node --check electron/preload.cjs
          node --check electron/attention-badge.cjs
          node --check electron/dev-launch.cjs
          node --check electron/render-icon.cjs
